<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities Workspace</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>

    <div class="sidebar">
        <div>
            <div class="sidebar-brand">
                <span>TheFolio Workspace</span>
                <span class="toggle-btn">&lt;</span>
            </div>

            <div class="sidebar-profile">
                <div class="profile-avatar">AB</div>
                <span class="profile-name">Ana Leah Basco</span>
            </div>

            <ul class="sidebar-menu">
                <li><a href="/admin/dashboard" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="/admin/gallery" class="sidebar-link">🖼️ Gallery</a></li>
                <li><a href="/admin/certificates" class="sidebar-link">🏅 Certificates</a></li>
                <li><a href="/admin/skills" class="sidebar-link">🛠️ Skills</a></li>
                <li><a href="/admin/activities" class="sidebar-link active">📌 Activities</a></li>
                <li><a href="/admin/messages" class="sidebar-link">✉️ Messages</a></li>
            </ul>
        </div>

        <ul class="sidebar-menu-bottom">
            <li><a href="/admin/logout" class="sidebar-link">🚪 Logout</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="header">
            <div>
                <h1>Activities</h1>
                <p>Manage your class work / activities timeline</p>
            </div>
            <button id="addActivityBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Activity
            </button>
        </div>

        <div class="list-wrapper">
            <div class="list-header">
                <h2>All Activities</h2>
                <p id="totalCount">Total: 0 activities</p>
            </div>
            <div class="certificate-grid" id="activityContainer"></div>
        </div>
    </div>

    <div id="activityModal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Activity</h2>

            <form id="activityForm">
                <label for="label">Label</label>
                <input type="text" id="label" placeholder="e.g., LAB 01">

                <label for="title">Title</label>
                <input type="text" id="title" required placeholder="e.g., Personal Profile Environment">

                <label for="description">Description</label>
                <textarea id="description" placeholder="What this activity involves..."></textarea>

                <label for="status">Status</label>
                <select id="status">
                    <option value="active">Active</option>
                    <option value="pending">Upcoming</option>
                </select>

                <label for="link_url">Link (optional, e.g. #hero)</label>
                <input type="text" id="link_url" placeholder="#hero">

                <label for="display_order">Display Order (lower shows first)</label>
                <input type="number" id="display_order" value="0">

                <button type="submit">Save Activity</button>
            </form>
        </div>
    </div>

    <script src="/admin/guard.js"></script>
    <script src="/admin/activities.js"></script>
</body>

</html>
